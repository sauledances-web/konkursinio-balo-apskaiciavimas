<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow rounded-4">
                <div class="card-body p-4">
                    <h1 class="text-center mb-4">Application Form</h1>

                    <form action="/submit" method="post">
                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" name="name" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Are you over 18?</label>
                            <select name="over18" class="form-select" required>
                                <option value="">Choose...</option>
                                <option value="yes">Yes</option>
                                <option value="no">No</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Are you over 18?</label>
                            <select name="over18" class="form-select" required>
                                <option value="">Choose...</option>
                                <option value="yes">Yes</option>
                                <option value="no">No</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Are you over 18?</label>
                            <select name="over18" class="form-select" required>
                                <option value="">Choose...</option>
                                <option value="yes">Yes</option>
                                <option value="no">No</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Do you have experience?</label>
                            <select name="experience" class="form-select" required>
                                <option value="">Choose...</option>
                                <option value="yes">Yes</option>
                                <option value="no">No</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Choose a category</label>
                            <select name="category" class="form-select" required>
                                <option value="">Choose...</option>
                                <option value="A">Category A</option>
                                <option value="B">Category B</option>
                                <option value="C">Category C</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Calculate Result</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
